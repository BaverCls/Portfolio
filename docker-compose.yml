version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always # Çökerse veya sunucu resetlenirse otomatik yeniden başlar

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend # Önce backendin ayağa kalkmasını bekler
    restart: always